<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>甜甜圈</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell" data-state="idle">
      <header class="page-head">
        <div class="page-icon" aria-hidden="true">⌘</div>
        <div class="page-copy">
          <p class="eyebrow">当前页面</p>
          <h1 id="title">读取中...</h1>
          <p id="url" class="url"></p>
        </div>
        <button id="settingsButton" class="settings-button" type="button" aria-label="打开插件设置">
          <span aria-hidden="true">⚙</span>
          <span>设置</span>
        </button>
      </header>

      <section class="channels" aria-label="采集渠道">
        <article class="channel-card" data-target="eagle">
          <button class="channel-summary" type="button" aria-expanded="false">
            <span class="channel-mark" aria-hidden="true"><img src="app-icons/eagle.png" alt=""></span>
            <span class="channel-copy">
              <strong>Eagle</strong>
              <small>素材、截图、网页快照</small>
            </span>
            <span class="channel-status" data-role="status">未生成</span>
          </button>
          <div class="channel-body">
            <label class="field">
              <span>Eagle 保存形式</span>
              <select id="eagleCaptureMode">
                <option value="screenshot">当前可见截图</option>
                <option value="top-image">页面首图 / Open Graph 图片</option>
                <option value="url">网页 URL 书签</option>
                <option value="snapshot">网页 HTML 快照</option>
              </select>
            </label>
            <div class="inline-state" data-role="inline-state">展开后自动生成预览。</div>
            <section class="candidate-panel" data-role="candidates" aria-label="Eagle 待收录素材">
              <div class="candidate-head">
                <strong>待收录素材</strong>
                <span>生成后可勾选</span>
              </div>
              <div class="candidate-list candidate-list-empty">展开后展示可收录的视频、截图、快照和链接。</div>
            </section>
            <div class="preview field-preview" data-role="preview"></div>
            <button class="channel-confirm" type="button" data-role="confirm" disabled>展开后生成预览</button>
          </div>
        </article>

        <article class="channel-card" data-target="bear">
          <button class="channel-summary" type="button" aria-expanded="false">
            <span class="channel-mark" aria-hidden="true"><img src="app-icons/bear.png" alt=""></span>
            <span class="channel-copy">
              <strong>Bear</strong>
              <small>阅读笔记条目</small>
            </span>
            <span class="channel-status" data-role="status">未生成</span>
          </button>
          <div class="channel-body">
            <div class="inline-state" data-role="inline-state">展开后自动生成预览。</div>
            <div class="preview field-preview" data-role="preview"></div>
            <div class="channel-actions">
              <label class="switch-row switch-row-compact">
                <span>
                  <strong>带截图</strong>
                  <small>仅影响本次写入</small>
                </span>
                <input id="bearScreenshotToggle" type="checkbox" role="switch" checked>
              </label>
              <button class="channel-confirm" type="button" data-role="confirm" disabled>展开后生成预览</button>
            </div>
          </div>
        </article>

        <article class="channel-card" data-target="obsidian">
          <button class="channel-summary" type="button" aria-expanded="false">
            <span class="channel-mark" aria-hidden="true"><img src="app-icons/obsidian.png" alt=""></span>
            <span class="channel-copy">
              <strong>Obsidian</strong>
              <small>Web Clipper 风格 Markdown</small>
            </span>
            <span class="channel-status" data-role="status">未生成</span>
          </button>
          <div class="channel-body">
            <label class="field">
              <span>Obsidian 模式</span>
              <select id="obsidianMode">
                <option value="auto">auto</option>
                <option value="journal">journal</option>
                <option value="thought">thought</option>
                <option value="clip">clip</option>
              </select>
            </label>
            <div class="inline-state" data-role="inline-state">展开后自动生成预览。</div>
            <div class="preview field-preview" data-role="preview"></div>
            <button class="channel-confirm" type="button" data-role="confirm" disabled>展开后生成预览</button>
          </div>
        </article>
      </section>

      <div class="popup-footer">
        <button id="footerSettingsButton" class="settings-link" type="button">打开配置页面</button>
      </div>
      <pre id="status" class="status" aria-live="polite"></pre>
    </main>
    <script src="config.js"></script>
    <script src="routerClient.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
